site_name: Quart-SocketIo
site_description: Async Socket.IO integration for Quart applications
site_url: https://robotz213.github.io/Quart-SocketIo/
repo_url: https://github.com/Robotz213/Quart-SocketIo
repo_name: Robotz213/Quart-SocketIo

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

nav:
  - Home: index.md
  - Guide:
      - Installation: installation.md
      - First app: quickstart.md
      - Events: events.md
      - Namespaces and rooms: namespaces-rooms.md
      - Configuration: configuration.md
      - Deployment and proxies: deployment.md
  - Reference:
      - Public API: api.md
      - Internal architecture: internals.md
      - Development: development.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: pt-BR
          name: Português brasileiro
          build: true
          site_name: Quart-SocketIo
          nav_translations:
            Home: Início
            Guide: Guia
            Installation: Instalação
            First app: Primeiro app
            Events: Eventos
            Namespaces and rooms: Namespaces e rooms
            Configuration: Configuração
            Deployment and proxies: Deploy e proxies
            Reference: Referência
            Public API: API pública
            Internal architecture: Arquitetura interna
            Development: Desenvolvimento
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            members_order: source
            docstring_style: sphinx
            separate_signature: true
            signature_crossrefs: true
            unwrap_annotated: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true
