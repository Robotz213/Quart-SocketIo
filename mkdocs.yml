site_name: PulseIo
site_description: Async Socket.IO integration for Quart applications
site_url: https://robotz213.github.io/PulseIo/
repo_url: https://github.com/Robotz213/PulseIo
repo_name: Robotz213/PulseIo

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

nav:
  - Inicio: index.md
  - Guia:
      - Instalacao: installation.md
      - Primeiro app: quickstart.md
      - Eventos: events.md
      - Namespaces e rooms: namespaces-rooms.md
      - Configuracao: configuration.md
      - Deploy e proxies: deployment.md
  - Referencia:
      - API publica: api.md
      - Arquitetura interna: internals.md
      - Desenvolvimento: development.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            members_order: source
            docstring_style: sphinx
            separate_signature: true
            signature_crossrefs: true
            unwrap_annotated: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true
